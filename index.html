<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width" />
  <title>Catálogo de Películas (Ghibli) • Inicio</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="css/wow.css" />
  <script type="module" src="js/lib/manejaErrores.js"></script>
</head>
<body>
  <header class="wow-header">
    <section class="wow-container">
      <h1 class="wow-title">🎬 Catálogo de Películas (Ghibli)</h1>
      <p id="saludoHeader" class="wow-saludo" aria-live="polite"></p>
      <nav class="wow-tabs" aria-label="Navegación principal">
        <a href="index.html" class="wow-tab is-active" aria-current="page">INICIO</a>
        <a href="pelisagregar.html" class="wow-tab">PELIS AGREGADAS</a>
      </nav>
    </section>
  </header>

  <main class="wow-main">
    <section class="wow-container">
      <section id="mensajes" class="wow-msg" aria-live="polite" hidden></section>

      <form id="formUsuario" class="wow-form" method="get" aria-labelledby="user-title">
        <h2 id="user-title" class="wow-form-title">👋 Tu nombre</h2>
        <p class="wow-help">Escribe tu nombre para mostrar un saludo dentro de la app.</p>
        <label class="wow-field">
          <span>Nombre</span>
          <input name="usuario" id="campoUsuario" placeholder="Ej: Fatima" autocomplete="given-name" required />
        </label>
        <p class="wow-form-actions">
          <button id="btnUsuario" type="submit" class="wow-btn wow-btn-secondary">Guardar nombre</button>
        </p>
        <p id="saludoInline" class="wow-help" aria-live="polite"></p>
      </form>

    </section>

    <section id="secCatalogo" class="wow-container" aria-labelledby="cat-title">
      <h2 id="cat-title" class="sr-only">Catálogo</h2>
      <section id="estado" class="wow-state" aria-live="polite">
        <p class="skeleton skeleton-title"></p>
        <p class="skeleton skeleton-subtitle"></p>
      </section>
      <ul id="gridPeliculas" class="wow-grid" aria-live="polite" aria-busy="true"></ul>
    </section>
  </main>

  <footer class="wow-footer">
    <section class="wow-container">
      <small>
        Datos API:
        <a class="wow-link" href="https://ghibliapi.vercel.app/films" target="_blank" rel="noopener noreferrer">
          Studio Ghibli API
        </a>.
        Backend y librerías del profesor (sin cambios).
      </small>
    </section>
  </footer>

  <script type="module" src="js/peliculas.js"></script>
</body>
</html>
